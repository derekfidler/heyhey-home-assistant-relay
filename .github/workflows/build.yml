name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check

  image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: heyhey_relay/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.value }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: ghcr.io/derekfidler/${{ matrix.arch }}-heyhey-home-assistant-relay:${{ steps.version.outputs.value }}

  manifest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx imagetools create \
            -t ghcr.io/derekfidler/heyhey-home-assistant-relay:${VERSION} \
            ghcr.io/derekfidler/aarch64-heyhey-home-assistant-relay:${VERSION} \
            ghcr.io/derekfidler/amd64-heyhey-home-assistant-relay:${VERSION}
